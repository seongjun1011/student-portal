server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
upload.dir.leave=uploads/leave
upload.dir.scholarship=uploads/scholarship
spring.application.name=student-portal

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# 날씨 외부 API (OpenWeatherMap) - 발급받은 키를 넣으면 실시간 날씨가 표시됩니다.
# https://openweathermap.org/api 에서 무료 키 발급 가능
# 키가 비어있으면 더미 날씨 데이터가 표시됩니다.
weather.api.key=
weather.api.city=Seoul
