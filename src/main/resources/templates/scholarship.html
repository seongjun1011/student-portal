<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>장학금신청 - 학생정보시스템</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .approval-flow {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0;
            margin: 10px 0 0;
        }
        .step-box {
            border-radius: 6px;
            padding: 7px 12px;
            font-size: 12px;
            line-height: 1.5;
            min-width: 108px;
            text-align: center;
            border: 1px solid var(--color-border);
        }
        .step-box .step-role  { font-size: 10.5px; opacity: 0.7; }
        .step-box .step-name  { font-weight: 700; font-size: 12.5px; }
        .step-box .step-cmnt  { font-size: 10.5px; margin-top: 2px; opacity: 0.75; }
        .step-box .step-date  { font-size: 10px; opacity: 0.6; margin-top: 1px; }
        .step-box.wait { background: #f5f7fa; color: #7a8494; }
        .step-box.ok   { background: #e4f4ea; color: #1e6e36; border-color: #a8dbb8; }
        .step-box.ng   { background: #fce8e6; color: #b03020; border-color: #f0b8b0; }
        .step-arrow { color: var(--color-text-light); font-size: 14px; padding: 0 6px; }

        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }
        .status-badge.pending  { background: #fdf3dc; color: var(--color-warning); }
        .status-badge.approved { background: #e4f4ea; color: var(--color-success); }
        .status-badge.rejected { background: #fce8e6; color: var(--color-danger); }
        .app-entry {
            padding-bottom: 22px;
            margin-bottom: 22px;
            border-bottom: 1px solid var(--color-border);
        }
        .app-entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        /* 파일 첨부 UI */
        .file-drop-zone {
            border: 2px dashed var(--color-border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #fafbfc;
        }
        .file-drop-zone:hover, .file-drop-zone.dragover {
            border-color: var(--color-primary);
            background: #f0f5ff;
        }
        .file-drop-zone .drop-icon { font-size: 28px; margin-bottom: 6px; }
        .file-drop-zone .drop-text { font-size: 13px; color: var(--color-text-light); }
        .file-drop-zone .drop-hint { font-size: 11.5px; color: #aaa; margin-top: 4px; }
        .file-list-preview {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .file-item-preview {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f0f4ff;
            border: 1px solid #d0daf5;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12.5px;
        }
        .file-item-preview .file-name { color: #2d3a5c; font-weight: 500; }
        .file-item-preview .file-size { color: #888; font-size: 11.5px; margin-left: 8px; }
        .file-item-preview .remove-btn {
            background: none; border: none; color: #c0392b;
            cursor: pointer; font-size: 14px; padding: 0 4px; line-height: 1;
        }

        /* 신청 내역의 첨부파일 목록 */
        .attached-files {
            margin-top: 10px;
        }
        .attached-files .files-label {
            font-size: 11.5px;
            color: var(--color-text-light);
            margin-bottom: 5px;
            font-weight: 600;
        }
        .attached-file-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #f0f4ff;
            border: 1px solid #d0daf5;
            border-radius: 4px;
            padding: 3px 9px;
            font-size: 12px;
            color: #2d3a5c;
            margin: 2px 3px 2px 0;
        }
        .attached-file-tag .file-icon { font-size: 13px; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header('system')}"></header>

<div class="app-body">
    <aside th:replace="~{fragments/sidebar :: sidebar('scholarship')}"></aside>

    <div class="app-content">
        <div class="breadcrumb">장학/등록 &gt; 장학금신청</div>
        <h2 class="page-title">장학금신청</h2>
        <p class="page-desc">교내 장학금을 신청합니다. 성적증명서, 가족관계증명서 등 필요 서류를 첨부하여 신청하세요.</p>

        <!-- 신청서 작성 -->
        <div class="card" style="max-width: 560px;">
            <div class="card-title">신청서 작성</div>
            <form th:action="@{/scholarship}" method="post" enctype="multipart/form-data">

                <div class="form-row">
                    <label for="type">장학금 종류</label>
                    <select id="type" name="type" required>
                        <option value="성적우수장학금">성적우수장학금</option>
                        <option value="근로장학금">근로장학금</option>
                        <option value="국가장학금">국가장학금</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="reason">신청 사유</label>
                    <textarea id="reason" name="reason" placeholder="신청 사유를 간략히 입력하세요." required></textarea>
                </div>

                <div class="form-row">
                    <label>첨부파일</label>
                    <div class="file-drop-zone" id="scholarshipDropZone" onclick="document.getElementById('scholarshipFiles').click()">
                        <div class="drop-icon">📎</div>
                        <div class="drop-text">클릭하거나 파일을 여기로 드래그하세요</div>
                        <div class="drop-hint">성적증명서·가족관계증명서·통장사본 등 · PDF, JPG, PNG, HWP · 파일당 최대 10MB</div>
                    </div>
                    <input type="file" id="scholarshipFiles" name="files" multiple
                           accept=".pdf,.jpg,.jpeg,.png,.hwp,.hwpx,.doc,.docx"
                           style="display:none" onchange="previewFiles(this, 'scholarshipPreviewList')">
                    <div class="file-list-preview" id="scholarshipPreviewList"></div>
                </div>

                <button type="submit" class="btn">신청하기</button>
            </form>
        </div>

        <!-- 신청 내역 -->
        <div class="card">
            <div class="card-title">신청 내역</div>

            <div th:if="${applications.isEmpty()}" class="empty-state">신청 내역이 없습니다.</div>

            <div class="app-entry" th:each="a : ${applications}">

                <!-- 제목 + 상태 -->
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 6px;">
                    <div>
                        <strong style="font-size:14.5px;" th:text="${a.type}">장학금</strong>
                        <span style="font-size:12px; color:var(--color-text-light); margin-left:10px;"
                              th:text="${#temporals.format(a.appliedAt, 'yyyy년 M월 d일 신청')}">날짜</span>
                    </div>
                    <span th:class="${'status-badge ' + (a.status == '승인' ? 'approved' : (a.status == '반려' ? 'rejected' : 'pending'))}"
                          th:text="${a.status}">심사중</span>
                </div>

                <!-- 사유 -->
                <p style="font-size:13px; color:var(--color-text-light); margin: 0 0 10px;"
                   th:text="${a.reason}">사유</p>

                <!-- 첨부파일 목록 -->
                <div class="attached-files" th:if="${!a.uploadedFiles.isEmpty()}">
                    <div class="files-label">첨부파일</div>
                    <span class="attached-file-tag" th:each="f : ${a.uploadedFiles}">
                        <span class="file-icon">📄</span>
                        <span th:text="${f.originalName}">파일명</span>
                    </span>
                </div>

                <!-- 결재 흐름 -->
                <div class="approval-flow">
                    <th:block th:each="step, st : ${a.approvalSteps}">
                        <div th:class="${'step-box ' + (step.status == '승인' ? 'ok' : (step.status == '반려' ? 'ng' : 'wait'))}">
                            <div class="step-role" th:text="${step.role}">역할</div>
                            <div class="step-name" th:text="${step.approverName}">담당자</div>
                            <div class="step-date" th:text="${step.status}">대기중</div>
                            <div class="step-cmnt" th:if="${step.comment != null}" th:text="${step.comment}">의견</div>
                            <div class="step-date" th:if="${step.processedAt != null}"
                                 th:text="${#temporals.format(step.processedAt, 'M/d')}">날짜</div>
                        </div>
                        <span class="step-arrow" th:unless="${st.last}">→</span>
                    </th:block>
                </div>

            </div>
        </div>

    </div>
</div>

<script>
    function previewFiles(input, listId) {
        const list = document.getElementById(listId);
        list.innerHTML = '';
        Array.from(input.files).forEach((file, idx) => {
            const size = file.size < 1024 * 1024
                ? (file.size / 1024).toFixed(1) + ' KB'
                : (file.size / 1024 / 1024).toFixed(1) + ' MB';
            const item = document.createElement('div');
            item.className = 'file-item-preview';
            item.innerHTML = `
                <span>
                    <span class="file-name">📄 ${escapeHtml(file.name)}</span>
                    <span class="file-size">${size}</span>
                </span>
                <button type="button" class="remove-btn" onclick="removeFile(this, '${input.id}', ${idx})">✕</button>
            `;
            list.appendChild(item);
        });
    }

    function removeFile(btn, inputId, removeIdx) {
        const input = document.getElementById(inputId);
        const dt = new DataTransfer();
        Array.from(input.files).forEach((f, i) => { if (i !== removeIdx) dt.items.add(f); });
        input.files = dt.files;
        const listId = inputId === 'leaveFiles' ? 'leavePreviewList' : 'scholarshipPreviewList';
        previewFiles(input, listId);
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // 드래그 앤 드롭
    const dropZone = document.getElementById('scholarshipDropZone');
    const fileInput = document.getElementById('scholarshipFiles');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const dt = new DataTransfer();
        Array.from(fileInput.files).forEach(f => dt.items.add(f));
        Array.from(e.dataTransfer.files).forEach(f => dt.items.add(f));
        fileInput.files = dt.files;
        previewFiles(fileInput, 'scholarshipPreviewList');
    });
</script>

</body>
</html>
